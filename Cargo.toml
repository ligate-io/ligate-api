[workspace]
resolver = "2"
members = [
    "crates/api",
    "crates/drip",
    "crates/indexer",
    "crates/types",
]

[workspace.package]
version = "0.1.0-devnet"
edition = "2021"
license = "Apache-2.0 OR MIT"
authors = ["Ligate Labs <hello@ligate.io>"]
repository = "https://github.com/ligate-io/ligate-api"
homepage = "https://ligate.io"
publish = false
rust-version = "1.93"

[workspace.dependencies]
# Internal — keep paths so each crate compiles standalone for tests.
ligate-api-drip    = { path = "crates/drip", version = "0.1.0-devnet" }
ligate-api-indexer = { path = "crates/indexer", version = "0.1.0-devnet" }
ligate-api-types   = { path = "crates/types", version = "0.1.0-devnet" }

# HTTP server. axum 0.8 to match what chain crates pull in (avoids a
# duplicate axum in the dep tree) and to use the `{name}` path-param
# syntax the handlers were already written against.
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors"] }

# Async + runtime
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# HTTP client (chain RPC reads, indexer pulls)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Postgres (indexer state, drip rate-limit history)
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
    "macros",
    "chrono",
    "json",
    "bigdecimal",
    "migrate",
] }

# Serde + JSON
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Borsh for transaction encoding (drip)
borsh = { version = "1", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Errors
anyhow = "1"
thiserror = "2"

# Time
chrono = { version = "0.4", default-features = false, features = ["std", "serde", "clock"] }

# Rate limiting (in-memory map of address -> last-drip-at; survives across
# restarts via Postgres backstop, but the hot path is the in-memory map).
dashmap = "6"

# CLI / env
clap = { version = "4", features = ["derive", "env"] }

# Misc
hex = "0.4"
url = "2"
base64 = "0.22"

# Chain crates (git deps; pin via branch=main until chain ships a stable rev).
ligate-client = { git = "https://github.com/ligate-io/ligate-chain.git", branch = "main", features = ["submit"] }
ligate-stf    = { git = "https://github.com/ligate-io/ligate-chain.git", branch = "main", features = ["native"] }
ligate-rollup = { git = "https://github.com/ligate-io/ligate-chain.git", branch = "main" }
attestation   = { git = "https://github.com/ligate-io/ligate-chain.git", branch = "main", features = ["native"] }

# Sovereign SDK pieces we directly construct. Pinned at upstream
# `f89964c66`; redirected to our fork by the `[patch]` block at the
# bottom of this file. The `[patch]` block is the single source of
# truth for which SDK rev ligate-api compiles against.
sov-bank        = { git = "https://github.com/Sovereign-Labs/sovereign-sdk.git", rev = "f89964c66bcfb6a31712e43278378b54c33d3779", features = ["native"] }
sov-modules-api = { git = "https://github.com/Sovereign-Labs/sovereign-sdk.git", rev = "f89964c66bcfb6a31712e43278378b54c33d3779", features = ["native"] }

# Redirect every Sovereign-Labs/sovereign-sdk dep to our fork on
# `ligate-mainline`. Mirrors the same block in
# `ligate-chain/Cargo.toml` so chain crates we consume (`ligate-stf`,
# `ligate-rollup`, `ligate-client`) and their transitives all resolve
# to the same SDK code the chain itself was compiled against.
#
# `[patch]` blocks don't transit across workspaces — consuming the
# chain via git dep alone doesn't pick up the chain's patch overrides.
# ligate-api needs its own mirror block, kept in lockstep with the
# chain's via the same fork rev.
#
# When bumping the chain pin, also bump the fork rev here. The chain's
# CONTRIBUTING.ligate.md documents the rebase / rev-bump workflow on
# the fork side.
[patch."https://github.com/Sovereign-Labs/sovereign-sdk.git"]
sov-accounts                   = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
