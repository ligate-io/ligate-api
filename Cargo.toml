sov-modules-stf-blueprint      = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-node-client                = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
