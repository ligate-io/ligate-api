sov-blob-storage               = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-build                      = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-capabilities               = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-celestia-adapter           = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-chain-state                = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-db                         = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-kernels                    = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-mock-da                    = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
