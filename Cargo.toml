sov-prover-incentives          = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-risc0-adapter              = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-rollup-apis                = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-rollup-full-node-interface = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
sov-rollup-interface           = { git = "https://github.com/ligate-io/sovereign-sdk.git", rev = "eab3f9d0ae0503040c20d9b702d28f434a067263" }
