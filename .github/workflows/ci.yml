name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Sovereign SDK macros walk up from OUT_DIR looking for
  # `constants.toml`. The faucet ships its own copy mirroring chain
  # repo; CI points the macro at it explicitly so no upward walk is
  # needed (and the build doesn't depend on the working directory).
  CONSTANTS_MANIFEST_PATH: ${{ github.workspace }}/constants.toml
  # Don't compile the risc0 zkVM guest — the chain's prover crate is
  # transitively pulled in via `ligate-rollup`, but the faucet doesn't
  # need real ZK proofs; mock zkvm is fine.
  SKIP_GUEST_BUILD: "1"
  RISC0_SKIP_BUILD_KERNELS: "1"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: clippy
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  # NOTE: cargo test is currently disabled because the chain's risc0
  # prover crate (transitively pulled via ligate-rollup) trips its
  # build-script even with SKIP_GUEST_BUILD=1 under `cargo test` (the
  # env vars don't propagate cleanly through test-bin compilation).
  # Unit tests for the faucet's own modules can run with `cargo build
  # --tests` plus a workspace-shaped invocation; real integration
  # tests live in the chain workspace where the SDK build env is
  # configured correctly. Re-enable once the risc0 toolchain is no
  # longer transitively required, or wire a feature flag in
  # ligate-rollup that omits the prover sub-crate.
  # test:
  #   name: cargo test
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: dtolnay/rust-toolchain@master
  #       with:
  #         toolchain: 1.93.0
  #     - uses: Swatinem/rust-cache@v2
  #     - run: cargo test

  # Smoke-test every migration in `migrations/` against a fresh
  # Postgres. Catches SQL syntax errors, constraint conflicts, and
  # ordering bugs at PR time rather than at Railway deploy time.
  #
  # Uses Postgres 16 (matches Railway's plugin default). The
  # `services:` block boots a container that's reachable on localhost
  # for the duration of the job. We apply migrations with `psql -f`
  # in filename order — sqlx's runtime applies them the same way.
  migrate:
    name: psql migrate (smoke)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ligate
          POSTGRES_PASSWORD: ligate
          POSTGRES_DB: ligate_indexer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ligate -d ligate_indexer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - name: Apply migrations
        env:
          PGPASSWORD: ligate
        run: |
          set -euo pipefail
          for f in $(ls migrations/*.sql | sort); do
            echo "::group::${f}"
            psql -h localhost -U ligate -d ligate_indexer -v ON_ERROR_STOP=1 -f "${f}"
            echo "::endgroup::"
          done
      - name: Sanity-check tables exist
        env:
          PGPASSWORD: ligate
        run: |
          psql -h localhost -U ligate -d ligate_indexer -v ON_ERROR_STOP=1 -tAc "
            SELECT table_name FROM information_schema.tables
             WHERE table_schema = 'public' ORDER BY table_name
          " | tee /tmp/tables.txt
          # The set of tables the indexer query layer needs.
          for required in slots indexer_state transactions attestor_sets schemas attestations address_summaries; do
            if ! grep -qx "${required}" /tmp/tables.txt; then
              echo "::error::missing table: ${required}"
              exit 1
            fi
          done

  # End-to-end indexer smoke. Spins up Postgres, applies migrations,
  # then runs `cargo test -p ligate-api-indexer --test e2e` which
  # stubs the chain REST surface via `mockito` and asserts the
  # indexer's ingest loop writes chain identity + the first slot row
  # to the real DB.
  #
  # Why not boot a real `ligate-node`: cold-cache build of the chain
  # binary is ~10 min in CI; the marginal coverage over canned chain
  # responses is low (typed deserialisation is already covered by
  # unit tests in `client.rs`). The thing this test actually catches
  # is "do the rows land in Postgres" — the failure mode the
  # mockito-only unit tests can't see. A real-chain `e2e-chain` job
  # can layer on top later (gated on the chain repo's docker image,
  # ligate-io/ligate-chain#280).
  e2e-indexer:
    name: indexer e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ligate
          POSTGRES_PASSWORD: ligate
          POSTGRES_DB: ligate_indexer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ligate -d ligate_indexer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - name: Apply migrations
        env:
          PGPASSWORD: ligate
        run: |
          set -euo pipefail
          for f in $(ls migrations/*.sql | sort); do
            psql -h localhost -U ligate -d ligate_indexer -v ON_ERROR_STOP=1 -f "${f}"
          done
      - name: Run e2e test
        env:
          DATABASE_URL: postgres://ligate:ligate@localhost:5432/ligate_indexer
        run: cargo test -p ligate-api-indexer --test e2e -- --nocapture

  # Single summary check that the branch ruleset can require. Mirrors
  # the pattern from `ligate-io/ligate-chain`. By gating the ruleset
  # on `CI pass` instead of each individual job, we get a stable
  # required-check name even if the underlying job set changes.
  ci-pass:
    name: CI pass
    if: always()
    needs: [fmt, clippy, check, migrate, e2e-indexer]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required checks
        env:
          FMT_RESULT: ${{ needs.fmt.result }}
          CLIPPY_RESULT: ${{ needs.clippy.result }}
          CHECK_RESULT: ${{ needs.check.result }}
          MIGRATE_RESULT: ${{ needs.migrate.result }}
          E2E_INDEXER_RESULT: ${{ needs.e2e-indexer.result }}
        run: |
          set -euo pipefail
          fail=0
          for var in FMT_RESULT CLIPPY_RESULT CHECK_RESULT MIGRATE_RESULT E2E_INDEXER_RESULT; do
            result="${!var}"
            if [[ "$result" != "success" ]]; then
              echo "::error::${var,,}: $result"
              fail=1
            fi
          done
          if [[ $fail -ne 0 ]]; then exit 1; fi
          echo "All required checks succeeded."
